name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GO_VERSION: "1.26.1"
  IMAGE_NAME: package-firewall
  IMAGE_PLATFORM: linux/arm64

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test
        run: make test

      - name: Vet
        run: make vet

  image:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.IMAGE_PLATFORM }}
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-ecr:
    name: Publish ECR image
    runs-on: ubuntu-latest
    needs:
      - test
      - image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ECR_REGISTRY != '' && vars.ECR_REPOSITORY != '' && vars.AWS_REGION != '' && vars.AWS_ROLE_ARN != ''
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.IMAGE_PLATFORM }}
          tags: |
            ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}:main
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
